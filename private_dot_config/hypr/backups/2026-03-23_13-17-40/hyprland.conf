################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = dolphin
$menu = hyprlauncher
$browser = brave
$editor = neovide


###################
### Vars ###
###################
$ipc = qs -c noctalia-shell ipc call

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = qs -c noctalia-shell
exec-once = snappy-switcher --daemon
exec-once = hyprpm reload
exec-once = kdeconnectd
# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = /usr/lib/kded6
exec-once = /home/wizard-28/.local/bin/horiclick # Emulate horizontal scrolling with middle mouse button
exec-once = easyeffects --gapplication-service
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = /usr/bin/kwalletd6
exec-once = sleep 2 && /usr/lib/pam_kwallet_init
